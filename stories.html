<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories | Iqbal's Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a1a;
            --secondary: #777;
            --border: #eeeeee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; overflow-x: hidden; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 40px 5%; }
        
        .back-nav { margin-bottom: 60px; }
        .back-nav a { text-decoration: none; color: var(--secondary); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Head Halaman */
        .story-header { margin-bottom: 80 :px; animation: fadeIn 1s ease-out; }
        .story-header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 6vw, 4rem); 
            margin-bottom: 20px; 
            font-weight: 400;
        }
        .story-intro { 
            font-size: 1.1rem; 
            color: var(--secondary); 
            max-width: 600px; 
            border-left: 2px solid var(--text); 
            padding-left: 20px;
            font-style: italic;
        }

        /* Daftar Artikel */
        #stories-container { display: flex; flex-direction: column; gap: 40px; }
        
        .story-item { 
            text-decoration: none; 
            color: inherit; 
            display: block; 
            padding-bottom: 30px;
            border-bottom: 1px solid var(--border);
            transition: 0.3s;
            animation: fadeIn 1.5s ease-out;
        }
        
        .story-meta { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--secondary); 
            margin-bottom: 10px; 
            display: block;
        }

        .story-item h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.8rem; 
            margin-bottom: 10px; 
            font-weight: 600;
            line-height: 1.2;
        }

        .story-item p { color: var(--secondary); font-size: 1rem; }
        .story-item:hover { opacity: 0.6; transform: translateX(5px); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Loading & Error State */
        .status-msg { color: var(--secondary); font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <nav class="back-nav"><a href="index.html">← Index</a></nav>

        <header class="story-header">
            <h1>The <i>Journal.</i></h1>
            <p class="story-intro">
                "Sebuah arsip digital berisi catatan perjalanan, kurasi visual, dan refleksi harian saya tentang desain, teknologi, dan cara hidup minimalis."
            </p>
        </header>

        <main id="stories-container">
            <p class="status-msg">Menyusun arsip cerita...</p>
        </main>
    </div>

    <script>
        // Menggunakan ID Spreadsheet yang Anda berikan
        const sheetID = "1nVlrwPeFXF2hlye-QOOnBjRxSQpHj4soEXnGI21_RqU";
        const baseURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadStories() {
            try {
                const response = await fetch(baseURL);
                const text = await response.text();
                
                // Membersihkan format JSON dari Google (menghapus prefix '/* google.visualization... */')
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('stories-container');
                container.innerHTML = '';

                let hasContent = false;

                rows.forEach(row => {
                    // Mapping Kolom (A=Status, B=Tanggal, C=Judul, D=Keyword/Kategori, E=URL, F=Deskripsi)
                    const status = row.c[0] ? row.c[0].v : "";
                    const tanggal = row.c[1] ? (row.c[1].f || row.c[1].v) : "";
                    const judul = row.c[2] ? row.c[2].v : "";
                    const kategori = row.c[3] ? row.c[3].v : "General";
                    const link = row.c[4] ? row.c[4].v : "#";
                    const deskripsi = row.c[5] ? row.c[5].v : "";

                    // Hanya tampilkan jika status mengandung kata "Published"
                    if (status && status.includes("Published")) {
                        hasContent = true;
                        container.innerHTML += `
                            <a href="${link}" class="story-item" target="_blank">
                                <span class="story-meta">${kategori} — ${tanggal}</span>
                                <h2>${judul}</h2>
                                <p>${deskripsi}</p>
                            </a>
                        `;
                    }
                });

                if (!hasContent) {
                    container.innerHTML = `<p class="status-msg">Belum ada cerita yang dipublikasikan.</p>`;
                }

            } catch (error) {
                console.error("Gagal memuat stories:", error);
                document.getElementById('stories-container').innerHTML = `
                    <p class="status-msg">Maaf, gagal memuat arsip. Pastikan akses Google Sheet diatur ke 'Anyone with the link'.</p>
                `;
            }
        }

        loadStories();
    </script>
</body>
</html>
