<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories | Iqbal's Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --secondary: #666666;
            --border: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            -webkit-font-smoothing: antialiased;
        }
        
        .container { max-width: 850px; margin: 0 auto; padding: 60px 5%; }
        
        /* Navigation */
        .back-nav { margin-bottom: 80px; }
        .back-nav a { 
            text-decoration: none; 
            color: var(--text); 
            font-size: 0.75rem; 
            font-weight: 500;
            text-transform: uppercase; 
            letter-spacing: 0.1em;
            transition: opacity 0.3s;
        }
        .back-nav a:hover { opacity: 0.5; }

        /* Header Section */
        .story-header { margin-bottom: 80px; }
        .story-header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 6vw, 4rem); 
            line-height: 1.1;
            margin-bottom: 20px; 
            font-weight: 400;
            letter-spacing: -0.03em;
        }
        .story-intro { 
            font-size: 1.1rem; 
            color: var(--secondary); 
            max-width: 550px; 
            font-weight: 300;
        }

        /* Stories List */
        #stories-container { 
            display: flex;
            flex-direction: column;
            gap: 50px; 
        }
        
        .story-item { 
            text-decoration: none; 
            color: inherit; 
            display: flex;
            gap: 30px;
            align-items: flex-start;
            padding-bottom: 50px;
            border-bottom: 1px solid var(--border);
            transition: opacity 0.3s ease;
        }

        .story-item:hover { opacity: 0.7; }

        /* Image Styling - Ukuran Sedang & Tajam */
        .image-wrapper {
            flex-shrink: 0;
            width: 180px; /* Ukuran sedang */
            height: 120px;
            overflow: hidden;
            border-radius: 4px;
            background: #f9f9f9;
            border: 1px solid var(--border);
        }

        .story-thumb { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        
        /* Content Styling */
        .story-content { flex: 1; }

        .story-meta { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.1em; 
            color: var(--secondary); 
            margin-bottom: 8px; 
            display: block;
        }

        .story-item h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.6rem; 
            margin-bottom: 10px; 
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        .story-item p { 
            color: var(--secondary); 
            font-size: 0.95rem; 
            display: -webkit-box;
            -webkit-line-clamp: 2; /* Potong teks jika terlalu panjang */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Mobile Adjustments */
        @media (max-width: 650px) {
            .story-item { flex-direction: column-reverse; gap: 20px; }
            .image-wrapper { width: 100%; height: 200px; }
            .story-header { margin-bottom: 50px; }
        }

        .status-msg { font-size: 0.9rem; color: var(--secondary); font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <nav class="back-nav"><a href="index.html">← Index</a></nav>

        <header class="story-header">
            <h1>The <i>Journal.</i></h1>
            <p class="story-intro">
                Arsip catatan perjalanan, kurasi visual, dan refleksi harian.
            </p>
        </header>

        <main id="stories-container">
            <p class="status-msg">Memuat arsip...</p>
        </main>
    </div>

    <script>
        const sheetID = "1hoXdQ5oBYy15AMGg9buOkuQO1a77dVlvcuw3Kh5iXJo";
        const baseURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadStories() {
            try {
                const response = await fetch(baseURL);
                const text = await response.text();
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('stories-container');
                container.innerHTML = '';

                let hasContent = false;

                rows.forEach((row) => {
                    const status = row.c[0] ? row.c[0].v : "";
                    const tanggal = row.c[1] ? (row.c[1].f || row.c[1].v) : "";
                    const judul = row.c[2] ? row.c[2].v : "";
                    const kategori = row.c[3] ? row.c[3].v : "Note";
                    const link = row.c[4] ? row.c[4].v : "#";
                    const deskripsi = row.c[5] ? row.c[5].v : "";
                    const gambar = row.c[6] ? row.c[6].v : "";

                    if (status && status.includes("Published")) {
                        hasContent = true;

                        // Layout Side-by-Side
                        container.innerHTML += `
                            <a href="${link}" class="story-item" target="_blank">
                                <div class="story-content">
                                    <span class="story-meta">${kategori} // ${tanggal}</span>
                                    <h2>${judul}</h2>
                                    <p>${deskripsi}</p>
                                </div>
                                ${gambar ? `
                                <div class="image-wrapper">
                                    <img src="${gambar}" class="story-thumb" alt="${judul}" loading="lazy">
                                </div>` : ''}
                            </a>
                        `;
                    }
                });

                if (!hasContent) {
                    container.innerHTML = `<p class="status-msg">Belum ada cerita yang dipublikasikan.</p>`;
                }

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('stories-container').innerHTML = `<p class="status-msg">Gagal memuat arsip.</p>`;
            }
        }

        loadStories();
    </script>
</body>
</html>
