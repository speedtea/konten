<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories | Iqbal's Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --secondary: #666666;
            --border: #f0f0f0;
            --accent: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.7; 
            -webkit-font-smoothing: antialiased;
        }
        
        .container { max-width: 900px; margin: 0 auto; padding: 60px 5%; }
        
        /* Navigation */
        .back-nav { margin-bottom: 100px; }
        .back-nav a { 
            text-decoration: none; 
            color: var(--text); 
            font-size: 0.75rem; 
            font-weight: 500;
            text-transform: uppercase; 
            letter-spacing: 0.1em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: opacity 0.3s;
        }
        .back-nav a:hover { opacity: 0.5; }

        /* Header Section */
        .story-header { margin-bottom: 120px; }
        .story-header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(3rem, 8vw, 5.5rem); 
            line-height: 0.9;
            margin-bottom: 30px; 
            font-weight: 400;
            letter-spacing: -0.04em;
        }
        .story-intro { 
            font-size: 1.2rem; 
            color: var(--secondary); 
            max-width: 500px; 
            font-weight: 300;
        }

        /* Stories List */
        #stories-container { 
            display: grid;
            grid-template-columns: 1fr;
            gap: 100px; 
        }
        
        .story-item { 
            text-decoration: none; 
            color: inherit; 
            display: block;
            group;
        }

        /* Image Styling */
        .image-wrapper {
            width: 100%;
            height: 450px;
            overflow: hidden;
            border-radius: 2px;
            margin-bottom: 30px;
            background: #f9f9f9;
        }

        .story-thumb { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .story-item:hover .story-thumb {
            transform: scale(1.05);
        }
        
        /* Content Styling */
        .story-meta { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            color: var(--secondary); 
            margin-bottom: 15px; 
            display: block;
            font-weight: 500;
        }

        .story-item h2 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(1.8rem, 4vw, 2.8rem); 
            margin-bottom: 15px; 
            font-weight: 500;
            line-height: 1.1;
            letter-spacing: -0.02em;
        }

        .story-item p { 
            color: var(--secondary); 
            font-size: 1.05rem; 
            max-width: 600px;
            font-weight: 300;
        }

        /* Animations */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .story-item {
            animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .container { padding: 40px 6%; }
            .story-header { margin-bottom: 60px; }
            .image-wrapper { height: 300px; }
            #stories-container { gap: 60px; }
        }

        .status-msg { 
            font-size: 0.9rem; 
            color: var(--secondary); 
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <nav class="back-nav"><a href="index.html">← Back to Index</a></nav>

        <header class="story-header">
            <h1>The <i>Journal.</i></h1>
            <p class="story-intro">
                Sebuah ruang untuk mencatat proses desain, penemuan teknologi, dan narasi visual dalam perjalanan saya.
            </p>
        </header>

        <main id="stories-container">
            <p class="status-msg">Fetching archive...</p>
        </main>
    </div>

    <script>
        const sheetID = "1hoXdQ5oBYy15AMGg9buOkuQO1a77dVlvcuw3Kh5iXJo";
        const baseURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        async function loadStories() {
            try {
                const response = await fetch(baseURL);
                const text = await response.text();
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                const container = document.getElementById('stories-container');
                container.innerHTML = '';

                let hasContent = false;

                rows.forEach((row, index) => {
                    const status = row.c[0] ? row.c[0].v : "";
                    const tanggal = row.c[1] ? (row.c[1].f || row.c[1].v) : "";
                    const judul = row.c[2] ? row.c[2].v : "";
                    const kategori = row.c[3] ? row.c[3].v : "Note";
                    const link = row.c[4] ? row.c[4].v : "#";
                    const deskripsi = row.c[5] ? row.c[5].v : "";
                    const gambar = row.c[6] ? row.c[6].v : "";

                    if (status && status.includes("Published")) {
                        hasContent = true;

                        // Gunakan placeholder elegan jika gambar kosong
                        const displayImage = gambar || 'https://images.unsplash.com/photo-1516414447565-b14be0adf13e?w=1000&q=80';

                        container.innerHTML += `
                            <article class="story-item" style="animation-delay: ${index * 0.1}s">
                                <a href="${link}" target="_blank" style="text-decoration: none; color: inherit;">
                                    <div class="image-wrapper">
                                        <img src="${displayImage}" class="story-thumb" alt="${judul}" loading="lazy">
                                    </div>
                                    <span class="story-meta">${kategori} // ${tanggal}</span>
                                    <h2>${judul}</h2>
                                    <p>${deskripsi}</p>
                                </a>
                            </article>
                        `;
                    }
                });

                if (!hasContent) {
                    container.innerHTML = `<p class="status-msg">The archive is currently empty.</p>`;
                }

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('stories-container').innerHTML = `
                    <p class="status-msg">Failed to connect to the archive. Please check back later.</p>
                `;
            }
        }

        loadStories();
    </script>
</body>
</html>
