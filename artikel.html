<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stories | Iqbal's Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --secondary: #666666;
            --border: #f0f0f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6; 
            -webkit-font-smoothing: antialiased;
        }
        
        .container { max-width: 850px; margin: 0 auto; padding: 60px 5%; }
        
        /* Navigation & Search */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; gap: 20px; }
        .back-nav a { text-decoration: none; color: var(--text); font-size: 0.75rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; }
        
        #search-input {
            padding: 8px 15px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85rem;
            outline: none;
            width: 200px;
            transition: width 0.3s ease;
        }
        #search-input:focus { width: 250px; border-color: #ccc; }

        /* Header Section */
        .story-header { margin-bottom: 60px; }
        .story-header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(2.5rem, 6vw, 4rem); 
            line-height: 1.1; margin-bottom: 20px; font-weight: 400; letter-spacing: -0.03em;
        }
        .story-intro { font-size: 1.1rem; color: var(--secondary); max-width: 550px; font-weight: 300; }

        /* Stories List */
        #stories-container { display: flex; flex-direction: column; gap: 50px; }
        
        .story-item { 
            text-decoration: none; color: inherit; display: flex; gap: 30px;
            align-items: flex-start; padding-bottom: 50px; border-bottom: 1px solid var(--border);
            transition: opacity 0.3s ease;
        }
        .story-item:hover { opacity: 0.7; }

        .image-wrapper {
            flex-shrink: 0; width: 180px; height: 120px; overflow: hidden;
            border-radius: 4px; background: #f9f9f9; border: 1px solid var(--border);
        }
        .story-thumb { width: 100%; height: 100%; object-fit: cover; }
        .story-content { flex: 1; }
        .story-meta { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--secondary); margin-bottom: 8px; display: block; }
        .story-item h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 10px; font-weight: 600; line-height: 1.2; letter-spacing: -0.01em; }
        .story-item p { color: var(--secondary); font-size: 0.95rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* Load More Button */
        #load-more-container { text-align: center; margin-top: 50px; }
        #load-more-btn {
            padding: 12px 30px; background: var(--text); color: white; border: none;
            border-radius: 30px; cursor: pointer; font-size: 0.9rem; font-family: 'Inter';
            display: none; transition: transform 0.2s ease;
        }
        #load-more-btn:active { transform: scale(0.95); }

        /* Skeleton Loading */
        .skeleton { height: 150px; background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 4px; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @media (max-width: 650px) {
            .story-item { flex-direction: column-reverse; gap: 20px; }
            .image-wrapper { width: 100%; height: 200px; }
            .top-bar { flex-direction: column; align-items: flex-start; }
            #search-input { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <nav class="back-nav"><a href="index.html">← Index</a></nav>
            <input type="text" id="search-input" placeholder="Cari cerita...">
        </div>

        <header class="story-header">
            <h1>The <i>Journal.</i></h1>
            <p class="story-intro">Arsip catatan perjalanan, kurasi visual, dan refleksi harian.</p>
        </header>

        <main id="stories-container">
            <div class="skeleton"></div>
            <div class="skeleton" style="margin-top: 20px;"></div>
        </main>

        <div id="load-more-container">
            <button id="load-more-btn">Lihat Lebih Banyak</button>
        </div>
    </div>

    <script>
        const sheetID = "1hoXdQ5oBYy15AMGg9buOkuQO1a77dVlvcuw3Kh5iXJo";
        const baseURL = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;
        
        let allStories = [];
        let filteredStories = [];
        let itemsToShow = 10;
        const container = document.getElementById('stories-container');
        const loadMoreBtn = document.getElementById('load-more-btn');
        const searchInput = document.getElementById('search-input');

        async function loadStories() {
            try {
                const response = await fetch(baseURL);
                const text = await response.text();
                const jsonData = JSON.parse(text.substr(47).slice(0, -2));
                const rows = jsonData.table.rows;
                
                allStories = rows.map(row => ({
                    status: row.c[0] ? row.c[0].v : "",
                    tanggal: row.c[1] ? (row.c[1].f || row.c[1].v) : "",
                    judul: row.c[2] ? row.c[2].v : "",
                    kategori: row.c[3] ? row.c[3].v : "Note",
                    link: row.c[4] ? row.c[4].v : "#",
                    deskripsi: row.c[5] ? row.c[5].v : "",
                    gambar: row.c[6] ? row.c[6].v : ""
                })).filter(s => s.status && s.status.includes("Published"));

                filteredStories = allStories;
                renderStories();

            } catch (error) {
                console.error("Error:", error);
                container.innerHTML = `<p class="status-msg">Gagal memuat arsip.</p>`;
            }
        }

        function renderStories(isSearching = false) {
            if (isSearching) itemsToShow = 10;
            
            const currentList = filteredStories.slice(0, itemsToShow);
            container.innerHTML = '';

            if (currentList.length === 0) {
                container.innerHTML = `<p class="status-msg">Tidak ada hasil ditemukan.</p>`;
                loadMoreBtn.style.display = 'none';
                return;
            }

            currentList.forEach(s => {
                container.innerHTML += `
                    <a href="${s.link}" class="story-item" target="_blank">
                        <div class="story-content">
                            <span class="story-meta">${s.kategori} // ${s.tanggal}</span>
                            <h2>${s.judul}</h2>
                            <p>${s.deskripsi}</p>
                        </div>
                        ${s.gambar ? `
                        <div class="image-wrapper">
                            <img src="${s.gambar}" class="story-thumb" alt="${s.judul}" loading="lazy">
                        </div>` : ''}
                    </a>
                `;
            });

            loadMoreBtn.style.display = itemsToShow < filteredStories.length ? 'inline-block' : 'none';
        }

        // Fungsi Cari
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            filteredStories = allStories.filter(s => 
                s.judul.toLowerCase().includes(term) || 
                s.deskripsi.toLowerCase().includes(term)
            );
            renderStories(true);
        });

        // Fungsi Load More
        loadMoreBtn.addEventListener('click', () => {
            itemsToShow += 10;
            renderStories();
        });

        loadStories();
    </script>
</body>
</html>
